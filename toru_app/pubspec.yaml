name: toru_app
description: Cross-platform AI assistant with offline capabilities
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Local Database
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0+4
  path: ^1.8.3
  path_provider: ^2.1.1
  
  # Local AI - llama.cpp bindings
  llama_cpp_dart: ^0.1.0
  
  # HTTP & Network
  http: ^1.1.0
  connectivity_plus: ^5.0.2
  
  # Local Notifications & Alarms
  flutter_local_notifications: ^16.3.0
  android_alarm_manager_plus: ^3.0.4
  workmanager: ^0.5.1
  
  # Cloud Sync (Optional)
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  
  # Maps & Navigation
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  
  # Vector Embeddings & Semantic Search
  vector_math: ^2.1.4
  
  # JSON Serialization
  json_annotation: ^4.8.1
  
  # Date & Time
  intl: ^0.18.1
  timezone: ^0.9.2
  
  # UI Components
  cupertino_icons: ^1.0.6
  flutter_spinkit: ^5.2.0
  
  # Voice Input (Bonus)
  speech_to_text: ^6.5.1
  permission_handler: ^11.1.0
  
  # Shared Preferences
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/models/
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: Roboto
      fonts:
        - asset: fonts/Roboto-Regular.ttf
        - asset: fonts/Roboto-Bold.ttf
          weight: 700
